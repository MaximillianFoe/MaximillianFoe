<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cihan Çoban</title>

  <!-- Favicon (emoji) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐵</text></svg>">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
    }

    .blob {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #ff7a18, transparent);
      filter: blur(80px);
      animation: float 8s ease-in-out infinite;
    }

    .blob:nth-child(2) {
      background: radial-gradient(circle, #00c6ff, transparent);
      top: 20%;
      left: 70%;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-40px); }
    }

    #monkey {
      position: absolute;
      font-size: clamp(80px, 15vw, 140px);
      user-select: none;
      cursor: grab;
    }

    #monkey:active {
      cursor: grabbing;
      transform: scale(1.1);
    }
  </style>
</head>

<body>
  <div class="blob"></div>
  <div class="blob"></div>

  <div id="monkey">🐵</div>

  <script>
    const monkey = document.getElementById("monkey");
    const emojis = ["🐵", "🙈", "🙉", "🙊"];
    let emojiIndex = 0;

    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;

    let vx = 0;
    let vy = 0;

    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    // CLICK → emoji change
    monkey.addEventListener("click", () => {
      emojiIndex = (emojiIndex + 1) % emojis.length;
      monkey.textContent = emojis[emojiIndex];
    });

    function startDrag(px, py) {
      isDragging = true;
      const rect = monkey.getBoundingClientRect();
      offsetX = px - rect.left;
      offsetY = py - rect.top;
      vx = 0;
      vy = 0;
    }

    function moveDrag(px, py) {
      if (!isDragging) return;
      const newX = px - offsetX;
      const newY = py - offsetY;

      vx = newX - x;
      vy = newY - y;

      x = newX;
      y = newY;
    }

    function stopDrag() {
      isDragging = false;
    }

    // Mouse
    monkey.addEventListener("mousedown", e => startDrag(e.clientX, e.clientY));
    document.addEventListener("mousemove", e => moveDrag(e.clientX, e.clientY));
    document.addEventListener("mouseup", stopDrag);

    // Touch
    monkey.addEventListener("touchstart", e => {
      const t = e.touches[0];
      startDrag(t.clientX, t.clientY);
    });

    document.addEventListener("touchmove", e => {
      const t = e.touches[0];
      moveDrag(t.clientX, t.clientY);
    });

    document.addEventListener("touchend", stopDrag);

    function update() {
      if (!isDragging) {
        x += vx;
        y += vy;

        // friction
        vx *= 0.98;
        vy *= 0.98;

        const rect = monkey.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;

        // boundaries + bounce
        if (x < 0) {
          x = 0;
          vx *= -0.8;
        }
        if (y < 0) {
          y = 0;
          vy *= -0.8;
        }
        if (x + w > window.innerWidth) {
          x = window.innerWidth - w;
          vx *= -0.8;
        }
        if (y + h > window.innerHeight) {
          y = window.innerHeight - h;
          vy *= -0.8;
        }
      }

      monkey.style.left = x + "px";
      monkey.style.top = y + "px";

      requestAnimationFrame(update);
    }

    update();
  </script>
</body>
</html>
